apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rez-ingress
  namespace: rez-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.rez.money
    - auth.rez.money
    - wallet.rez.money
    - payment.rez.money
    - merchant.rez.money
    - order.rez.money
    secretName: rez-tls
  rules:
  - host: api.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 3000
  - host: auth.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
  - host: wallet.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wallet-service
            port:
              number: 3002
  - host: payment.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 3003
  - host: merchant.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: merchant-service
            port:
              number: 3004
  - host: order.rez.money
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 3005
