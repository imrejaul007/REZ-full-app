# Secret template - RENAME to secrets.yaml and fill in actual values
# DO NOT commit secrets.yaml to version control
apiVersion: v1
kind: Secret
metadata:
  name: rez-secrets
  namespace: rez-production
type: Opaque
stringData:
  mongodb-uri: "mongodb://user:password@hostname:27017/rez?authSource=admin"
  redis-url: "redis://:password@hostname:6379"
  jwt-secret: "YOUR_JWT_SECRET_HERE"
  stripe-secret-key: "sk_test_YOUR_STRIPE_KEY"
  paystack-secret-key: "sk_live_YOUR_PAYSTACK_KEY"
