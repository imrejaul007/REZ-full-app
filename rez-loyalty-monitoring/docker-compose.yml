version: '3.8'

services:
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4010:4010"
    environment:
      - NODE_ENV=production
      - PORT=4010
      - MONGODB_URI=mongodb://mongo:27017/rez-loyalty-monitoring
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROFILE_AGGREGATOR_URL=http://profile-aggregator:4025
      - STREAK_SERVICE_URL=http://streak-service:4026
      - CROSS_MERCHANT_URL=http://cross-merchant:4027
      - SCORE_SERVICE_URL=http://score-service:4028
      - KARMA_BRIDGE_URL=http://karma-bridge:4029
      - LOG_LEVEL=info
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4010/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis_data:
