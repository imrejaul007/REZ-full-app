global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'rez-production'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # rez-delivery-service (4010)
  - job_name: 'rez-delivery-service'
    static_configs:
      - targets: ['rez-delivery-service:4010']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'rez-delivery-service:4010'
      - source_labels: [__address__]
        target_label: service
        replacement: 'rez-delivery-service'

  # rez-analytics-service (4016)
  - job_name: 'rez-analytics-service'
