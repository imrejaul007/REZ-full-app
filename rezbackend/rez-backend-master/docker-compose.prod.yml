version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rez-backend:${VERSION:-latest}
    container_name: rez-api
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      # Database
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      # Security
      - JWT_SECRET=${JWT_SECRET}
      - JWT_MERCHANT_SECRET=${JWT_MERCHANT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ADMIN_SECRET=${JWT_ADMIN_SECRET}
      # Public URLs (required for invoice/email links to resolve correctly)
      - PUBLIC_URL=${PUBLIC_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - MERCHANT_FRONTEND_URL=${MERCHANT_FRONTEND_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      # Payment Gateways
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_ACCOUNT_NUMBER=${RAZORPAY_ACCOUNT_NUMBER}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # External Services
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Push Notifications
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      # OCR
      - GOOGLE_CLOUD_VISION_API_KEY=${GOOGLE_CLOUD_VISION_API_KEY}
      # Feature Flags
      - BBPS_ENABLED=${BBPS_ENABLED:-false}
      - FEATURE_PRIVE_CAMPAIGNS=${FEATURE_PRIVE_CAMPAIGNS:-false}
      - TRAVEL_WEBHOOK_SECRET=${TRAVEL_WEBHOOK_SECRET}
      # Gateway / service-to-service auth
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      # Safety guards (must be explicitly false in production)
      - LOG_OTP_FOR_TESTING=false
      - AUTO_CREATE_INDEXES=false
      - DEBUG_MODE=false
      # Monitoring
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rez-network
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MongoDB with authentication
  mongo:
    image: mongo:6.0
    container_name: rez-mongo
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=rez
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rez-network

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: rez-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - rez-network

  # Nginx reverse proxy (optional, for SSL termination)
  nginx:
    image: nginx:alpine
    container_name: rez-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    restart: always
    depends_on:
      - api
    networks:
      - rez-network
    profiles:
      - with-nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  rez-network:
    driver: bridge
