name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  REGISTRY: docker.io
  IMAGE_NAME: rezapp/merchant-backend

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=staging-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  integration-tests:
    name: Integration Tests
    needs: build-image
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          JWT_MERCHANT_SECRET: test-merchant-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci

  deploy:
    name: Deploy to Staging
    needs: [build-image, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: https://staging-api.rezapp.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging cluster
        run: |
          kubectl set image deployment/merchant-backend \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.image-tag }} \
            -n staging

      - name: Wait for rollout
        run: kubectl rollout status deployment/merchant-backend -n staging --timeout=5m

      - name: Verify pods
        run: kubectl get pods -n staging -l app=merchant-backend

  smoke-tests:
    name: Smoke Tests
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for service stabilization
        run: sleep 15

      - name: Smoke test - health, DB, and Redis
        run: |
          echo "Fetching health endpoint..."
          RESPONSE=$(curl -sf --retry 5 --retry-delay 5 --retry-all-errors \
            "${{ secrets.STAGING_URL }}/health")
          echo "Health response: $RESPONSE"

          # Verify overall status
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" = "error" ]; then
            echo "FAIL: Health status is 'error'"
            exit 1
          fi
          echo "OK: Health status: $STATUS"

          # Verify database connection
          DB_STATUS=$(echo "$RESPONSE" | jq -r '.database // "unknown"')
          if [ "$DB_STATUS" = "false" ] || [ "$DB_STATUS" = "disconnected" ]; then
            echo "FAIL: Database is not connected: $DB_STATUS"
            exit 1
          fi
          echo "OK: Database status: $DB_STATUS"

          # Verify Redis connection
          # Health endpoint returns redis as a plain string ("connected"/"disconnected"/"error"),
          # not as an object with a .status field.
          REDIS_STATUS=$(echo "$RESPONSE" | jq -r '.redis // "unknown"')
          if [ "$REDIS_STATUS" = "disconnected" ] || [ "$REDIS_STATUS" = "error" ]; then
            echo "FAIL: Redis is not connected: $REDIS_STATUS"
            exit 1
          fi
          echo "OK: Redis status: $REDIS_STATUS"

          echo "All smoke tests passed"

  notify:
    name: Slack Notification
    needs: [deploy, smoke-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ] && [ "${{ needs.smoke-tests.result }}" = "success" ]; then
            echo "color=#36a64f" >> $GITHUB_OUTPUT
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "color=#dc3545" >> $GITHUB_OUTPUT
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ steps.status.outputs.emoji }} *Staging Deploy ${{ steps.status.outputs.status }}*\n*Repo:* ${{ github.repository }}\n*Commit:* `${{ github.sha }}` by ${{ github.actor }}\n*Branch:* `main`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
