    <!-- Razorpay SDK — BUG-W23 FIX: onerror sets a flag so the checkout page
         can detect the failure and show a fallback payment option instead of

    <script
      src="https://checkout.razorpay.com/v1/checkout.js"

    <title>REZ Menu</title>
    <!-- REZ Smart App Banner — opens REZ app if installed, stays in browser if not -->
    <style>
      #rez-app-banner {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        background: #1a3a52;
        color: #fff;
        padding: 10px 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        font-size: 13px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        align-items: center;
        gap: 10px;
      }
      #rez-app-banner.visible { display: flex; }
      #rez-banner-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #ffcd57;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      #rez-banner-text { flex: 1; line-height: 1.3; }
      #rez-banner-text strong { display: block; font-size: 14px; color: #ffcd57; }
      #rez-banner-open {
        background: #ffcd57;
        color: #1a3a52;
        border: none;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      #rez-banner-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.6);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        flex-shrink: 0;
        line-height: 1;
      }
    </style>
    <div id="rez-app-banner">
      <div id="rez-banner-icon">🏪</div>
      <div id="rez-banner-text">
        <strong>Open in REZ App</strong>
        Earn coins &amp; get exclusive offers
      </div>
      <button id="rez-banner-open">Open App</button>
      <button id="rez-banner-close" aria-label="Dismiss">✕</button>
    </div>
    <script>
    (function() {
      var ua = navigator.userAgent || '';
      var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
      if (!isMobile) return;
      var dismissed = sessionStorage.getItem('rez_banner_dismissed');
      if (dismissed) return;
      var pathname = window.location.pathname;
      // Only show on store pages, not on cart/checkout/order pages
      var noShow = /\/(cart|checkout|order|confirm|receipt|payment)/.test(pathname);
      if (noShow) return;
      var slug = pathname.replace(/^\//, '').split('/')[0];
      if (!slug || slug.length < 2) return;
      var tableParam = new URLSearchParams(window.location.search).get('table') || '';
      var appScheme = 'rezapp://order/' + slug + (tableParam ? '?table=' + encodeURIComponent(tableParam) : '');
      var banner = document.getElementById('rez-app-banner');
      if (!banner) return;
      banner.classList.add('visible');
      // Push content down so banner doesn't overlap
      document.documentElement.style.paddingTop = '62px';
      document.getElementById('rez-banner-open').addEventListener('click', function() {
        var fallbackTimer = setTimeout(function() {
          // App not installed — stay in browser, hide banner
          banner.classList.remove('visible');
          document.documentElement.style.paddingTop = '';
          sessionStorage.setItem('rez_banner_dismissed', '1');
        }, 1500);
        window.location.href = appScheme;
        // If app opens, we won't get here; clear timer on visibility change
        document.addEventListener('visibilitychange', function onVis() {
          if (document.hidden) {
            clearTimeout(fallbackTimer);
            document.removeEventListener('visibilitychange', onVis);
            banner.classList.remove('visible');
            document.documentElement.style.paddingTop = '';
          }
        });
      });
      document.getElementById('rez-banner-close').addEventListener('click', function() {
        banner.classList.remove('visible');
        document.documentElement.style.paddingTop = '';
        sessionStorage.setItem('rez_banner_dismissed', '1');
      });
    })();
    </script>
    <!-- REZ API URL injection — must load before any JS module.
         Change NEXT_PUBLIC_API_URL on Vercel to point to any backend. -->
    <script>window.__NEXT_PUBLIC_API_URL__="https://api.rezapp.com/api/web-ordering";</script>
