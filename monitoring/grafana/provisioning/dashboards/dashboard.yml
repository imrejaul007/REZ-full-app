apiVersion: 1

providers:
  - name: 'REZ Dashboards'
    orgId: 1
    folder: 'REZ'
    folderUid: 'rez'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
