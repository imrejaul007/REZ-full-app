# =============================================================================
# Alerting Configuration
# =============================================================================
# Configure your notification channels here
# =============================================================================

# Slack Configuration
SLACK_WEBHOOK_URL=https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK

# PagerDuty Configuration
PAGERDUTY_ROUTING_KEY=your-pagerduty-integration-key

# Email Configuration
EMAIL_TO=alerts@example.com
EMAIL_FROM=monitoring@example.com
SMTP_HOST=smtp.example.com
SMTP_PORT=587
SMTP_USER=monitoring@example.com
SMTP_PASS=your-smtp-password

# Generic Webhook (for custom integrations)
WEBHOOK_URL=https://your-webhook-endpoint.com/alerts

# Discord Configuration
DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/your-discord-webhook

# Flock Configuration
FLOCK_WEBHOOK_URL=https://api.flock.com/hooks/sendMessage/your-flock-webhook

# Alert Settings
ALERT_COOLDOWN=300  # Seconds between repeated alerts for same issue
