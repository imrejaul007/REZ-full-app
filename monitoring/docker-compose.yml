# REZ Ecosystem - Complete Monitoring Stack
version: '3.8'

services:
  # ─── Prometheus Stack ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: rez-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    environment:
      - PROMETHEUS_RETENTION_TIME=15d
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Grafana Stack ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: rez-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.rez.money
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: rez-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.console.libraries=/usr/share/alertmanager/console_libraries'
      - '--web.console.templates=/usr/share/alertmanager/consoles'
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY}
    restart: unless-stopped
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Loki (Log Aggregation) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: rez-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - monitoring

  # ─── Promtail (Log Shipping) ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: rez-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - loki

  # ─── Node Exporter ─────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: rez-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ─── cAdvisor (Container Metrics) ──────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: rez-cadvisor
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--store_container_labels=false'
      - '--allow_dynamic_housekeeping=true'
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ─── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: rez-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - redis

  # ─── MongoDB Exporter ──────────────────────────────────────────────────────
  mongodb-exporter:
    image: percona/mongodb_exporter:mongodb_exporter.1.0.0
    container_name: rez-mongodb-exporter
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    ports:
      - "9216:9216"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - mongodb

  # ─── BullMQ Exporter ───────────────────────────────────────────────────────
  bullmq-exporter:
    image:/rezaul/bullmq-exporter:latest
    container_name: rez-bullmq-exporter
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - redis

  # ─── Alertmanager Bot (Slack Integration) ──────────────────────────────────
  alertmanager-bot:
    image: metalmatze/alertmanager-bot:0.4.3
    container_name: rez-alertmanager-bot
    environment:
      - ALERTMANAGER_URL=http://alertmanager:9093
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_CHANNEL=#alerts
      - STORE=boltdb
    volumes:
      - ./alertmanager-bot:/data
    ports:
      - "9111:9111"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - alertmanager

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  monitoring:
    driver: bridge
    name: rez-monitoring

# ─── External Dependencies (Required but not managed here) ────────────────────
# These services should be running in your main docker-compose:
#   - redis (port 6379)
#   - mongodb (port 27017)
#   - rez-api (port 3000)
#   - wallet-service (port 3003)
#   - payment-service (port 3004)
#   - etc.
