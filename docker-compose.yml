      dockerfile: Dockerfile
    container_name: rez-now
    restart: unless-stopped
    ports:
      - '3003:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3003
      NEXT_PUBLIC_API_URL: https://api.rezapp.com
      REZ_AUTH_SERVICE_URL: http://localhost:4002
      REZ_WALLET_SERVICE_URL: http://localhost:4004
      REZ_MERCHANT_SERVICE_URL: http://localhost:4005
      # Sentry is initialized in next.config.ts with org: rez-money, project: rez-now
      # Set these in production; they are safe to be empty in dev
      SENTRY_AUTH_TOKEN: ''
      NEXT_PUBLIC_SENTRY_DSN: ''
    depends_on:
      - auth-api
      - merchant-api
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/_next/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ./rez-now/app:/app/app:ro
      - ./rez-now/lib:/app/lib:ro
      - ./rez-now/components:/app/components:ro
      - ./rez-now/public:/app/public:ro
      - ./rez-now/i18n:/app/i18n:ro

  # ── Shared Volumes ────────────────────────────────────

volumes:
  mongodb_primary_data:
    driver: local
  mongodb_secondary1_data:
    driver: local
  mongodb_secondary2_data:
    driver: local
  mongodb_backup_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ── Networks ─────────────────────────────────────────────
networks:
  rez-network:
    name: rez-network
    driver: bridge
