# ============================================================
# REZ Ecosystem — Local Development Docker Compose
# ============================================================
# Usage:
#   Full stack:    docker compose up
#   Backend only:  docker compose up auth-api merchant-api rendez-backend
#   Frontend only: docker compose up nextabizz-web hotel-panel
#   With deps:     docker compose up -d mongodb-primary mongodb-secondary-1 mongodb-secondary-2 redis postgres
#
# Ports exposed:
#   MongoDB Primary:     27017
#   MongoDB Secondary 1:  27018
#   MongoDB Secondary 2:  27019
#   Redis:               6379
#   PostgreSQL:          5432
#
#   REZ Service Ports (Standard):
#   Auth:            4002
#   Payment:         4001
#   Order:           3006
#   Wallet:          4004
#   Merchant:        4005
#   Catalog:         3005
#   Search:          4003
#   Gamification:     3001
#   Ads:             4007
#   Marketing/Rendez:4000
#   Karma:           3009
#
# MongoDB Replica Set:
#   Primary:   mongodb://mongodb-primary:27017
#   All nodes: mongodb://mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/?replicaSet=rs0
# ============================================================

services:
  # ── Databases & Cache ────────────────────────────────────

  # ── MongoDB Replica Set (3-node for production-like local dev) ──
  # Format: mongodb://mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/?replicaSet=rs0

  mongodb-primary:
    image: mongo:7
    container_name: rez-mongodb-primary
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_primary_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 2
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - rez-network

  mongodb-secondary-1:
    image: mongo:7
    container_name: rez-mongodb-secondary-1
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - mongodb_secondary1_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 1
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - rez-network

  mongodb-secondary-2:
    image: mongo:7
    container_name: rez-mongodb-secondary-2
    restart: unless-stopped
    ports:
      - '27019:27017'
    volumes:
      - mongodb_secondary2_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 1 --hidden true
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - rez-network

  mongodb-init:
    image: mongo:7
    container_name: rez-mongodb-init
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary-1:
        condition: service_healthy
      mongodb-secondary-2:
        condition: service_healthy
    entrypoint: ['mongosh', '--host', 'mongodb-primary', '--eval', '''
      try {
        rs.initiate({
          _id: "rs0",
          members: [
            {_id: 0, host: "mongodb-primary:27017", priority: 2},
            {_id: 1, host: "mongodb-secondary-1:27017", priority: 1},
            {_id: 2, host: "mongodb-secondary-2:27017", priority: 1, hidden: true}
          ]
        });
        print("Replica set initialized with 3 nodes");
      } catch (e) {
        if (e.message.includes("already initialized")) {
          print("Replica set already initialized");
        } else {
          throw e;
        }
      }
    ''']
    networks:
      - rez-network
    restart: 'no'

  # ── MongoDB Backup Service ──────────────────────────────
  mongodb-backup:
    image: mongo:7
    container_name: rez-mongodb-backup
    restart: unless-stopped
    volumes:
      - mongodb_backup_data:/backups/mongodb
      - ./scripts:/scripts:ro
      - ./scripts/mongodb-backup.sh:/usr/local/bin/mongodb-backup:ro
      - ./scripts/mongodb-restore.sh:/usr/local/bin/mongodb-restore:ro
      - ./scripts/mongodb-backup-verify.sh:/usr/local/bin/mongodb-backup-verify:ro
    environment:
      - MONGODB_URI=mongodb://mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/?replicaSet=rs0
      - BACKUP_DIR=/backups/mongodb
      - RETENTION_DAYS=${MONGODB_BACKUP_RETENTION_DAYS:-30}
      - S3_BUCKET=${MONGODB_S3_BUCKET:-}
      - S3_PREFIX=${MONGODB_S3_PREFIX:-mongodb}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      mongodb-primary:
        condition: service_healthy
    entrypoint: ['tail', '-f', '/dev/null']
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - rez-network

  redis:
    image: redis:7-alpine
    container_name: rez-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: rez-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rez_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rez}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Core Backend Services ────────────────────────────────

  auth-api:
    build:
      context: ./rez-auth-service
      dockerfile: Dockerfile
    container_name: rez-auth-service
    restart: unless-stopped
    ports:
      - '4002:4002'
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb-primary:27017/rez_auth_dev
      REDIS_URL: redis://redis:6379
      PORT: 4002
      NODE_OPTIONS: --max-old-space-size=512
      # JWT secrets - use environment variables in production
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-}
      JWT_MERCHANT_SECRET: ${JWT_MERCHANT_SECRET:-}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET:-}
      OTP_TOTP_ENCRYPTION_KEY: ${OTP_TOTP_ENCRYPTION_KEY:-}
      EXPOSE_DEV_OTP: 'false'
      LOG_LEVEL: debug
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4002/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - ./rez-auth-service/src:/app/src:ro

  merchant-api:
    build:
      context: ./rez-merchant-service
      dockerfile: Dockerfile
    container_name: rez-merchant-service
    restart: unless-stopped
    ports:
      - '4005:4005'
    environment:
      NODE_ENV: development
      PORT: 4005
      MONGODB_URI: mongodb://mongodb-primary:27017/rez_merchant_dev
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: --max-old-space-size=512
      # Merchant secrets - use environment variables in production
      JWT_MERCHANT_SECRET: ${JWT_MERCHANT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      MARKETING_SERVICE_URL: http://marketing-api:4000
      LOG_LEVEL: debug
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4005/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - ./rez-merchant-service/src:/app/src:ro

  rendez-backend:
    build:
      context: ./Rendez/rendez-backend
      dockerfile: Dockerfile
    container_name: rendez-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rez}:${POSTGRES_PASSWORD}@postgres:5432/rendez_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRES_IN: 7d
      NODE_OPTIONS: --max-old-space-size=512
      REZ_AUTH_SERVICE_URL: http://auth-api:4002
      REZ_OAUTH_CLIENT_ID: rendez-app
      # OAuth secrets - use environment variables in production
      REZ_OAUTH_CLIENT_SECRET: ${REZ_OAUTH_CLIENT_SECRET:-}
      REZ_OAUTH_REDIRECT_URI: http://localhost:4000/api/auth/oauth/callback
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - ./Rendez/rendez-backend/src:/app/src:ro
      - ./Rendez/rendez-backend/prisma:/app/prisma:ro

  hotel-ota-api:
    build:
      context: ./Hotel OTA
      dockerfile: ./apps/api/Dockerfile
    container_name: hotel-ota-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rez}:${POSTGRES_PASSWORD}@postgres:5432/hotel_ota_dev
      REDIS_URL: redis://redis:6379
      REZ_AUTH_SERVICE_URL: http://auth-api:4002
      REZ_MERCHANT_SERVICE_URL: http://merchant-api:4005
      JWT_SECRET: ${JWT_SECRET:-}
      NODE_OPTIONS: --max-old-space-size=512
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      merchant-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    volumes:
      - ./Hotel OTA/apps/api/src:/app/src:ro

