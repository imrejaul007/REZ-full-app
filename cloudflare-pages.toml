# Cloudflare Pages Config
build_command = "npm run build"
build_output_dir = ".next"
```

[[redirects]]
source = "/old-path"
status = 301
destination = "/new-path"

[[headers]]
  [[headers.values]]
    name = "Cache-Control"
    value = "max-age=31536000"

[[headers.values]]
  name = "X-Content-Type-Options"
  value = "nosniff"
```

[[headers]]
for = "/static/*"
values = """
  [headers.values]
    name = "Cache-Control"
    value = "public, max-age=31536000, immutable"
```

[[headers]]
for = "/_next/static/*"
values = """
  [headers.values]
    name = "Cache-Control"
    value = "public, max-age=31536000, immutable"
```

[[headers]]
for = "/api/*"
values = """
  [headers.values]
    name = "Cache-Control"
    value = "no-cache"
```

[[headers]]
for = "/*"
  [values]
    name = "X-Frame-Options"
    value = "DENY"
  [values]
    name = "X-Content-Type-Options"
    value = "nosniff"
  [values]
    name = "X-XSS-Protection"
    value = "1; mode=block"
```toml
name = "rez-platform"
compatibility_date = "2024-01-01"
```
