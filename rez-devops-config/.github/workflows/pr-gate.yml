name: ReZ Pull Request Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: rez-devops-config/.github/workflows/ci.yml@main
    with:
      service_name: ${{ github.event.repository.name }}
      node_version: '20'
      run_tests: true
      run_lint: true
      run_typecheck: true
      run_build: true
      run_arch_fitness: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  pr-checks:
    name: PR Requirements
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description length
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ ${#BODY} -lt 50 ]; then
            echo "PR description is too short. Please fill in the template."
            exit 1
          fi
          if echo "$BODY" | grep -q "Fixes #"; then
            echo "Linked issue found"
          else
            echo "WARNING: No linked issue (Fixes #<number>)"
          fi

      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ ! "$BRANCH" =~ ^(feature/|fix/|hotfix/|chore/|docs/) ]]; then
            echo "Branch '$BRANCH' does not follow naming convention (feature/*, fix/*, hotfix/*, chore/*, docs/*)"
            exit 1
          fi
