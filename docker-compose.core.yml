# =============================================================================
# ReZ Platform - Core Services Docker Compose
# Production deployment for: API Gateway, Auth, Wallet, Payment, Merchant, Order,
# Finance, Search services
# =============================================================================
# Usage:
#   Start: docker-compose -f docker-compose.core.yml up -d
#   Stop:  docker-compose -f docker-compose.core.yml down
#   Logs:  docker-compose -f docker-compose.core.yml logs -f [service]
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # API Gateway (Entry Point)
  # ===========================================================================
  rez-api-gateway:
    build:
      context: ./rez-api-gateway
      dockerfile: Dockerfile
    container_name: rez-api-gateway
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - MERCHANT_SERVICE_URL=http://merchant-api:4005
      - PAYMENT_SERVICE_URL=http://payment-api:4001
      - ORDER_SERVICE_URL=http://order-api:3006
      - WALLET_SERVICE_URL=http://wallet-api:4004
      - CATALOG_SERVICE_URL=http://catalog-api:3005
      - SEARCH_SERVICE_URL=http://search-api:4003
      - FINANCE_SERVICE_URL=http://finance-api:4006
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Auth Service
  # ===========================================================================
  auth-api:
    build:
      context: ./rez-auth-service
      dockerfile: Dockerfile
    container_name: rez-auth-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - MONGODB_URI=mongodb://mongodb:27017/rez_auth
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_refresh_secret}
      - OTP_HMAC_SECRET=${OTP_HMAC_SECRET:-dev_otp_secret}
      - OTP_TOTP_ENCRYPTION_KEY=${OTP_TOTP_ENCRYPTION_KEY:-dev_totp_key}
      - EXPOSE_DEV_OTP=false
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Wallet Service
  # ===========================================================================
  wallet-api:
    build:
      context: ./rez-wallet-service
      dockerfile: Dockerfile
    container_name: rez-wallet-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      - NODE_ENV=production
      - PORT=4004
      - MONGODB_URI=mongodb://mongodb:27017/rez_wallet
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - PAYMENT_SERVICE_URL=http://payment-api:4001
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Payment Service
  # ===========================================================================
  payment-api:
    build:
      context: ./rez-payment-service
      dockerfile: Dockerfile
    container_name: rez-payment-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MONGODB_URI=mongodb://mongodb:27017/rez_payment
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - WALLET_SERVICE_URL=http://wallet-api:4004
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      wallet-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Merchant Service
  # ===========================================================================
  merchant-api:
    build:
      context: ./rez-merchant-service
      dockerfile: Dockerfile
    container_name: rez-merchant-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=production
      - PORT=4005
      - MONGODB_URI=mongodb://mongodb:27017/rez_merchant
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - JWT_MERCHANT_SECRET=${JWT_MERCHANT_SECRET:-dev_merchant_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Order Service
  # ===========================================================================
  order-api:
    build:
      context: ./rez-order-service
      dockerfile: Dockerfile
    container_name: rez-order-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017/rez_order
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - MERCHANT_SERVICE_URL=http://merchant-api:4005
      - PAYMENT_SERVICE_URL=http://payment-api:4001
      - WALLET_SERVICE_URL=http://wallet-api:4004
      - CATALOG_SERVICE_URL=http://catalog-api:3005
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      merchant-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Finance Service
  # ===========================================================================
  finance-api:
    build:
      context: ./rez-finance-service
      dockerfile: Dockerfile
    container_name: rez-finance-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      - NODE_ENV=production
      - PORT=4006
      - MONGODB_URI=mongodb://mongodb:27017/rez_finance
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - WALLET_SERVICE_URL=http://wallet-api:4004
      - PAYMENT_SERVICE_URL=http://payment-api:4001
      - ORDER_SERVICE_URL=http://order-api:3006
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Search Service
  # ===========================================================================
  search-api:
    build:
      context: ./rez-search-service
      dockerfile: Dockerfile
    container_name: rez-search-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      - NODE_ENV=production
      - PORT=4003
      - MONGODB_URI=mongodb://mongodb:27017/rez_search
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--max-old-space-size=512
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-dev_token}
      - AUTH_SERVICE_URL=http://auth-api:4002
      - CATALOG_SERVICE_URL=http://catalog-api:3005
      - LOG_LEVEL=info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # Infrastructure Services
  # ===========================================================================
  mongodb:
    image: mongo:7
    container_name: rez-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping:1})' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: rez-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rez-core-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# =============================================================================
# Networks
# =============================================================================
networks:
  rez-core-network:
    name: rez-core-network
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
