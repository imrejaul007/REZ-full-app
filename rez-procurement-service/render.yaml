# Render Blueprint for rez-procurement-service
# NextaBizz B2B Procurement Service - Express.js

services:
  - type: web
    name: rez-procurement-service
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4012
      # Supabase Configuration
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Database
      - key: DATABASE_URL
        sync: false
      # Optional: Redis for caching
      - key: REDIS_URL
        sync: false
