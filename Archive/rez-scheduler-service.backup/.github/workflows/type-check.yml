name: TypeScript Type Check

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
  push:
    branches:
      - main
      - develop
      - staging

env:
  NODE_VERSION: '20'

jobs:
  type-check:
    name: Type Check All Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Type check root workspace
        run: npm run typecheck --if-present
        continue-on-error: false

      - name: Type check shared-types package
        run: npm run build
        working-directory: packages/shared-types
        continue-on-error: false

      - name: Type check individual services
        run: |
          # Type check each service with TypeScript
          for dir in rez-auth-service rez-wallet-service rez-payment-service rez-merchant-service rez-order-service rez-catalog-service rez-search-service rez-gamification-service rez-ads-service rez-marketing-service; do
            if [ -d "$dir" ] && [ -f "$dir/tsconfig.json" ]; then
              echo "Type checking $dir..."
              cd "$dir"
              npm ci --prefer-offline --no-audit 2>/dev/null || true
              npx tsc --noEmit || {
                echo "Type check failed for $dir"
                cd ..
                exit 1
              }
              cd ..
            fi
          done
        continue-on-error: false

      - name: Report type check completion
        if: success()
        run: echo "Type checking completed successfully for all packages"

      - name: Report type check failures
        if: failure()
        run: |
          echo "Type check failed. Please review the output above for errors."
          exit 1
