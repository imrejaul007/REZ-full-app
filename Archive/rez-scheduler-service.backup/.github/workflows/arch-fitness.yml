name: Architecture Fitness Tests

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
  push:
    branches:
      - main
      - develop
      - staging

jobs:
  fitness-tests:
    name: Run Architecture Fitness Tests (10 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run all architecture fitness tests
        run: bash scripts/arch-fitness/run-all.sh
        continue-on-error: false

      - name: Install pre-commit hooks
        run: bash scripts/arch-fitness/install-hooks.sh
        continue-on-error: true

      - name: Generate burn-down dashboard
        run: npm run burn-down || true
        continue-on-error: true
