name: Merchant Service CI/CD

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths:
      - 'rez-merchant-service/**'
      - '.github/workflows/merchant*.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'rez-merchant-service/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: rez-merchant-service-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_NAME: rez-merchant-service
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-merchant-service

jobs:
  # ────────────────────────────────────────────────────────────────────
  # JOB 1: LINT & TYPE CHECK
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rez-merchant-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-merchant-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────
  # JOB 2: UNIT TESTS (with MongoDB + Redis)
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: rez-merchant-service

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 4005
      MONGODB_URI: mongodb://localhost:27017/rez_merchant_test
      REDIS_URL: redis://localhost:6379
      JWT_MERCHANT_SECRET: test-merchant-jwt-secret-32-chars!!
      ENCRYPTION_KEY: test-encryption-key-32-bytes-exactly!
      INTERNAL_SERVICE_TOKEN: test-internal-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-merchant-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit --runInBand
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rez-merchant-service-coverage
          path: rez-merchant-service/coverage/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────
  # JOB 3: SECURITY SCAN
  # ────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: rez-merchant-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: rez-merchant-service
          format: 'sarif'
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ────────────────────────────────────────────────────────────────────
  # JOB 4: BUILD DOCKER IMAGE
  # ────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: rez-merchant-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ────────────────────────────────────────────────────────────────────
  # JOB 5: DEPLOY TO RENDER
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://rez-merchant-service.onrender.com

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render deployment for ${{ env.SERVICE_NAME }}..."
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST $RENDER_DEPLOY_HOOK_URL
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render trigger"
            echo "To enable auto-deploy, add RENDER_MERCHANT_SERVICE_DEPLOY_HOOK to GitHub Secrets"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_MERCHANT_SERVICE_DEPLOY_HOOK }}

  # ────────────────────────────────────────────────────────────────────
  # JOB 6: SMOKE TESTS
  # ────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 30

      - name: Health check — liveness
        run: |
          echo "Testing: /health/live"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://rez-merchant-service.onrender.com/health/live || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Liveness probe passed (HTTP $STATUS)"
          else
            echo "❌ Liveness probe failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Health check — readiness (MongoDB + Redis)
        run: |
          echo "Testing: /health/ready"
          RESPONSE=$(curl -sf https://rez-merchant-service.onrender.com/health/ready || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ Readiness probe passed"
          else
            echo "❌ Readiness probe failed"
            exit 1
          fi

      - name: Health check — full health
        run: |
          echo "Testing: /health"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://rez-merchant-service.onrender.com/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Full health check passed (HTTP $STATUS)"
          else
            echo "❌ Full health check failed (HTTP $STATUS)"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────
  # JOB 7: NOTIFY ON COMPLETION
  # ────────────────────────────────────────────────────────────────────
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()

    steps:
      - name: Slack notification — success
        if: needs.smoke-tests.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL || 'C05XXXXXXXXX' }}
          slack-message: |
            ✅ *REZ Merchant Service* deployed successfully
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            Author: @${{ github.actor }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notification — failure
        if: needs.smoke-tests.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL || 'C05XXXXXXXXX' }}
          slack-message: |
            ❌ *REZ Merchant Service* deployment FAILED
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
