name: Order Service CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
    paths: ['rez-order-service/**', 'rez-shared/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rez-order-service/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: rez-order-service
      - name: Type check
        run: npx tsc --noEmit
        working-directory: rez-order-service
        continue-on-error: true
      - name: Lint
        run: npm run lint
        working-directory: rez-order-service
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: rez-order-service

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ vars.RENDER_ORDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
        continue-on-error: true
      - name: Trigger Render worker deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ vars.RENDER_ORDER_WORKER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: rez-order-service
        continue-on-error: true
