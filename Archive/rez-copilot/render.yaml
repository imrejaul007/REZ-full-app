# render.yaml — ReZ Copilot Service
# Unified AI Copilot - Consumer + Merchant + Support + Admin
#
# Deploy: render blueprint create (CLI) or push to GitHub + link on Render dashboard
#
# REQUIRED — set in Render dashboard > Service > Environment:
#   MONGODB_URI              — MongoDB Atlas cluster
#   REDIS_URL                — Redis instance for session management
#   INTERNAL_SERVICE_TOKENS_JSON — JSON array of service tokens

services:
  - type: web
    name: rez-copilot
    env: node
    region: singapore
    plan: free
    nodeVersion: '20'
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckThreshold: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4026'
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
      # AI Configuration (for future Claude/OpenAI integration)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: CLAUDE_MAX_TOKENS
        value: '1024'
