# Redis Cluster Configuration
# This file is included by each cluster node

# General Settings
daemonize no
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Memory Management
# Increased from 200mb to 4gb for 169+ services ecosystem
maxmemory 4gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Security
# requirepass redis-password  # Uncomment if using authentication

# Performance Tuning
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 0

# Database
databases 16

# Replication
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-disable-tcp-nodelay no
repl-backlog-size 1048576
repl-backlog-ttl 3600

# Cluster Specific
cluster-require-full-coverage yes
cluster-replica-no-failover no
