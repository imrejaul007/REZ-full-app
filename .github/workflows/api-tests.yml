name: API Tests

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours

  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Finance tests
        run: |
          cd rez-finance-service
          npm ci
          npm test
