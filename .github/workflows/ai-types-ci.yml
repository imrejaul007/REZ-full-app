name: ai-types CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/ai-types/**'
      - '.github/workflows/ai-types-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/ai-types/**'
      - '.github/workflows/ai-types-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-types

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/ai-types/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-types-dist
          path: packages/ai-types/dist
          retention-days: 7
