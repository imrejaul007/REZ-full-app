name: Backup

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Backup MongoDB
        run: |
          mongodump --uri=$MONGODB_URI --out=/backup/$DATE
      - name: Upload to S3
        run: |
          aws s3 sync /backup s3://rez-backups/
