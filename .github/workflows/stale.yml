name: Mark Stale

on:
  schedule:
    # Run at 00:00 UTC every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      debug_only:
        description: 'Debug mode (dry run)'
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────
  # Mark stale PRs and issues
  # ─────────────────────────────────────────────────────────
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          # Issue configuration
          days-before-issue-stale: 90
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. If this is still a valid issue, please add a comment to keep it open.

            *Note: This is an automated message generated by the stale workflow.*

          close-issue-message: |
            This issue has been automatically closed because it was marked as stale. If you believe this is still relevant, please feel free to reopen.

            *Note: This is an automated message generated by the stale workflow.*

          # PR configuration
          days-before-pr-stale: 60
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.

            *Note: This is an automated message generated by the stale workflow.*

          close-pr-message: |
            This PR has been automatically closed because it was marked as stale.

            *Note: This is an automated message generated by the stale workflow.*

          # Exempt certain labels
          exempt-issue-labels: 'keep-open,bug,feature,enhancement,priority'
          exempt-pr-labels: 'keep-open,work-in-progress'

          # Operations
          remove-stale-when-updated: true
          debug-only: ${{ github.event.inputs.debug_only == 'true' }}

          # Statistics
          operations-per-run: 100

  # ─────────────────────────────────────────────────────────
  # Close stale PRs with merge conflicts
  # ─────────────────────────────────────────────────────────
  close-conflicted:
    name: Close Conflicted PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Close PRs with merge conflicts
        run: |
          echo "Checking for stale PRs with merge conflicts..."

          # Get all open PRs
          prs=$(gh pr list --state=open --json number,title,mergeable --jq '.[] | select(.mergeable == "CONFLICTING") | {number, title}')

          if [ -z "$prs" ]; then
            echo "No conflicting PRs found."
            exit 0
          fi

          echo "$prs" | while read pr; do
            number=$(echo "$pr" | jq -r '.number')
            title=$(echo "$pr" | jq -r '.title')

            echo "Closing PR #$number: $title (has merge conflicts)"
            gh pr edit "$number" --add-label "merge-conflict" || true
            gh pr comment "$number" --body "This PR is being closed due to unresolved merge conflicts. Please resolve the conflicts and reopen, or close this PR if no longer needed.

*Note: This is an automated action generated by the stale workflow.*" || true
          done

  # ─────────────────────────────────────────────────────────
  # Notify maintainers of stale items
  # ─────────────────────────────────────────────────────────
  notify-stale:
    name: Notify Stale Items
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Get stale issues
        run: |
          # Get count of stale issues
          stale_count=$(gh issue list --state=open --label="stale" --json number --jq 'length')

          if [ "$stale_count" -gt 0 ]; then
            echo "Found $stale_count stale issues"

            # Add a tracking comment to the main issue tracker
            gh issue comment 1 --body "There are currently $stale_count stale issues in the repository. Please review and close those that are no longer relevant.

*This is an automated reminder generated by the stale workflow.*" 2>/dev/null || echo "Could not add tracking comment"
          fi

  # ─────────────────────────────────────────────────────────
  # Generate stale report
  # ─────────────────────────────────────────────────────────
  report:
    name: Stale Report
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate report
        run: |
          echo "=========================================="
          echo "  STALE ITEMS REPORT"
          echo "=========================================="
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Triggered by: ${{ github.actor }}"
          echo ""

          # Count stale items
          stale_issues=$(gh issue list --state=open --label="stale" --json number --jq 'length')
          stale_prs=$(gh pr list --state=open --label="stale" --json number --jq 'length')

          echo "Stale items found:"
          echo "  - Issues: $stale_issues"
          echo "  - PRs: $stale_prs"
          echo ""

          # Get details
          if [ "$stale_issues" -gt 0 ]; then
            echo "Stale issues:"
            gh issue list --state=open --label="stale" --json number,title --jq '.[] | "  #\(.number): \(.title)"'
            echo ""
          fi

          if [ "$stale_prs" -gt 0 ]; then
            echo "Stale PRs:"
            gh pr list --state=open --label="stale" --json number,title --jq '.[] | "  #\(.number): \(.title)"'
            echo ""
          fi

          echo "=========================================="
