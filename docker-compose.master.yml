    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb-primary:27017/rez_auth_dev
      REDIS_URL: redis://redis:6379
      PORT: 4002
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
