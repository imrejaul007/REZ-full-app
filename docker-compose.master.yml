    container_name: rez-identity-service
    restart: unless-stopped
    ports:
      - '4027:4027'
    environment:
      NODE_ENV: development
      PORT: 4027
      MONGODB_URI: mongodb://mongodb-primary:27017/rez_identity
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rez-master-network

  rez-app-admin:
    build:
      context: RTNM-Group/rez-app-admin
      dockerfile: Dockerfile
    container_name: rez-app-admin
    restart: unless-stopped
    ports:
      - '3010:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4026
      REZ_AUTH_SERVICE_URL: http://localhost:4002
    depends_on:
      - rez-auth-service
      - rez-access-control-service
    networks:
      - rez-master-network

