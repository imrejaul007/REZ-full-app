# ============================================================
# ReZ Ecosystem — Master Docker Compose
# ============================================================
# Master orchestration file for all 9 company repos:
#   1. REZ-Intelligence   6. CorpPerks
#   2. REZ-Media          7. StayOwn-Hospitality
#   3. REZ-Consumer        8. RTNM-Group
#   4. REZ-Merchant       9. RTNM-Digital
#   5. RABTUL-Technologies
#
# Usage:
#   Start all:      docker compose -f docker-compose.master.yml up -d
#   Start specific: docker compose -f docker-compose.master.yml up -d rez-auth-service
#   Stop all:       docker compose -f docker-compose.master.yml down
#   View logs:      docker compose -f docker-compose.master.yml logs -f
#
# ============================================================

version: '3.8'

services:
  # ============================================================
  # CORE INFRASTRUCTURE
  # ============================================================

  mongodb-primary:
    image: mongo:7
    container_name: rez-mongodb-primary
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - rez_mongodb_primary_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 2
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rez-master-network

  mongodb-secondary-1:
    image: mongo:7
    container_name: rez-mongodb-secondary-1
    restart: unless-stopped
    ports:
      - '27018:27017'
    volumes:
      - rez_mongodb_secondary1_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 1
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rez-master-network

  mongodb-secondary-2:
    image: mongo:7
    container_name: rez-mongodb-secondary-2
    restart: unless-stopped
    ports:
      - '27019:27017'
    volumes:
      - rez_mongodb_secondary2_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all --priority 1 --hidden true
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rez-master-network

  redis:
    image: redis:7-alpine
    container_name: rez-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - rez_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - rez-master-network

  postgres:
    image: postgres:15-alpine
    container_name: rez-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rez_dev}
    volumes:
      - rez_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rez}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rez-master-network

