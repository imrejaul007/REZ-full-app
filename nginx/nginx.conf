events {
    worker_connections 1024;
}

http {
    upstream rez-now {
        server rez-now:3000;
    }

    upstream verify-service {
        server verify-service:3000;
    }

    upstream rez-try {
        server rez-try:3000;
    }

    upstream auth-api {
        server auth-api:4002;
    }

    upstream merchant-api {
        server merchant-api:4005;
    }

    upstream rendez-backend {
        server rendez-backend:4000;
    }

    # REZ Now - Merchant QR platform
    server {
        listen 80;
        server_name now.rez.money;

        location / {
            proxy_pass http://rez-now;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Verify Service - Product verification
    server {
        listen 80;
        server_name verify.rez.money;

        location / {
            proxy_pass http://verify-service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # REZ Try - Trial discovery
    server {
        listen 80;
        server_name try.rez.money;

        location / {
            proxy_pass http://rez-try;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Auth API
    server {
        listen 80;
        server_name auth.rez.money;

        location / {
            proxy_pass http://auth-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Merchant API
    server {
        listen 80;
        server_name api.rez.money;

        location / {
            proxy_pass http://merchant-api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Rendez Backend
    server {
        listen 80;
        server_name rendez.rez.money;

        location / {
            proxy_pass http://rendez-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
