# ============================================================
# CORE SERVICES TO ADD TO docker-compose.yml
# ============================================================
# Copy these definitions into docker-compose.yml after merchant-api
# ============================================================

  # === CORE BACKEND SERVICES (MISSING) ===

  rez-payment-service:
    build:
      context: ./rez-payment-service
      dockerfile: Dockerfile
    container_name: rez-payment-service
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      NODE_ENV: development
      PORT: 4001
      MONGODB_URI: mongodb://mongodb-primary:27017/rez_payment_dev
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: --max-old-space-size=512
      JWT_SECRET: ${JWT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      AUTH_SERVICE_URL: http://auth-api:4002
      WALLET_SERVICE_URL: http://rez-wallet-service:4004
      LOG_LEVEL: debug
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4001/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

