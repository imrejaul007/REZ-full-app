# =============================================================================
# REZ WebSocket Hub - Render Deployment Configuration
# =============================================================================

services:
  - type: web
    name: rez-websocket-hub
    env: docker
    region: oregon
    plan: pro

    dockerfilePath: ./Dockerfile
    dockerContext: ../

    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckThreshold: 3

    autoScaling:
      minInstances: 2
      maxInstances: 20
      targetCPUPercent: 70
      targetMemoryPercent: 80

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3013
      - key: APP_NAME
        value: rez-websocket-hub
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

    diskMounts:
      - mountPath: /var/log/rez
        name: rez-logs
        sizeGB: 10

deploymentStrategy: rolling

notifications:
  slack:
    url: https://hooks.slack.com/services/xxx
    on: [failed, reactivated]
