# =============================================================================
# REZ Platform - Production Docker Compose
# =============================================================================
# Run with: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: '3.9'

services:
  # -----------------------------------------------------------------------------
  # rez-delivery-service
  # -----------------------------------------------------------------------------
  rez-delivery-service:
    image: rez/delivery-service:${VERSION:-latest}
    container_name: rez-delivery-service
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_NAME=rez-delivery-service
      - DATABASE_HOST=postgres-primary
      - DATABASE_PORT=5432
      - DATABASE_NAME=rez_delivery
      - DATABASE_USERNAME=${POSTGRES_USER:-rez_delivery_user}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_SSL=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-rez_delivery}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DELIVERY_PROVIDER_API_KEY=${DELIVERY_PROVIDER_API_KEY}
      - GEOCODING_API_KEY=${GEOCODING_API_KEY}
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - rez-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

