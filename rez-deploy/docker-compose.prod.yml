      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=rez-analytics-service
      - KAFKA_GROUP_ID=rez-analytics-consumer-group
      - KAFKA_TOPIC_EVENTS=rez.events
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - METRICS_PORT=9091
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres-primary:
