# =============================================================================
# REZ Platform - Single Service Docker Compose Template
# =============================================================================
# Use this template to deploy a single service locally for development/testing
# Usage: SERVICE_NAME=rez-delivery-service docker-compose -f docker-compose.single.yml up -d
# =============================================================================

version: '3.9'

services:
  ${SERVICE_NAME}:
    image: rez/${SERVICE_NAME}:${VERSION:-latest}
    container_name: ${SERVICE_NAME}
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-3000}:${SERVICE_PORT:-3000}"
      - "${METRICS_PORT:-9090}:${METRICS_PORT:-9090}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${SERVICE_PORT:-3000}
      - APP_NAME=${SERVICE_NAME}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_NAME=${DATABASE_NAME:-rez_main}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - METRICS_ENABLED=true
      - METRICS_PORT=${METRICS_PORT:-9090}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVICE_PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-1.0}'
          memory: '${MEMORY_LIMIT:-512M}'
        reservations:
          cpus: '${CPU_RESERVE:-0.5}'
          memory: '${MEMORY_RESERVE:-256M}'
    networks:
      - rez-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - ${SERVICE_NAME}

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rez-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - ${SERVICE_NAME}

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rez-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    profiles:
      - ${SERVICE_NAME}

networks:
  rez-network:
    driver: bridge
    name: rez-network

volumes:
  postgres-data:
    name: rez-postgres-data-${SERVICE_NAME}
  redis-data:
    name: rez-redis-data-${SERVICE_NAME}
