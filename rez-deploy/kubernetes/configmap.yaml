# =============================================================================
# rez-delivery-service ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rez-delivery-service-config
  namespace: rez-production
  labels:
    app: rez-delivery-service
data:
  NODE_ENV: "production"
  PORT: "3000"
  APP_NAME: "rez-delivery-service"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DATABASE_HOST: "postgres-primary.rez-infra.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "rez_delivery"
  DATABASE_SSL: "true"
  DATABASE_POOL_MIN: "5"
  DATABASE_POOL_MAX: "20"
  REDIS_HOST: "redis.rez-infra.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_KEY_PREFIX: "rez:delivery:"
  RABBITMQ_HOST: "rabbitmq.rez-infra.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "rez_delivery"
  RABBITMQ_PREFETCH: "10"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  METRICS_PATH: "/metrics"
  PROMETHEUS_ENABLED: "true"
  JAEGER_ENABLED: "true"

