# =============================================================================
# REZ Platform - Kubernetes Service Manifest
# =============================================================================
# Contains services for all 15 REZ microservices
# =============================================================================

---
# =============================================================================
# rez-delivery-service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: rez-delivery-service
  namespace: rez-production
  labels:
    app: rez-delivery-service
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: rez-delivery-service

