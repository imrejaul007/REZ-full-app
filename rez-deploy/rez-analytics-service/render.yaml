# =============================================================================
# REZ Analytics Service - Render Deployment Configuration
# =============================================================================

services:
  - type: web
    name: rez-analytics-service
    env: docker
    region: oregon
    plan: pro

    dockerfilePath: ./Dockerfile
    dockerContext: ../

    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckThreshold: 3

    autoScaling:
      minInstances: 2
      maxInstances: 8
      targetCPUPercent: 70
      targetMemoryPercent: 80

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: APP_NAME
        value: rez-analytics-service
      - key: CLICKHOUSE_URL
        sync: false
      - key: KAFKA_BROKERS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

    diskMounts:
      - mountPath: /var/log/rez
        name: rez-logs
        sizeGB: 10

preDeployCommand: npm run migrate:production
deploymentStrategy: rolling

notifications:
  slack:
    url: https://hooks.slack.com/services/xxx
    on: [failed, reactivated]
