# Kong Gateway Declarative Configuration
# OPS-003 FIX: Centralized API Gateway with JWT validation, rate limiting,
# circuit breaking, and mTLS support
#
# Usage:
#   kong config parse kong.yml  # Validate
#   kong config db_init kong.yml  # Initialize database
#   kong reload  # Reload with new config
#
# For Docker:
#   docker run -d --name kong \
#     -e "KONG_DATABASE=postgres" \
#     -e "KONG_PG_HOST=postgres" \
#     -e "KONG_DECLARATIVE_CONFIG=/usr/local/kong/kong.yml" \
#     -p 8000:8000 -p 8443:8443 \
#     kong:latest

_format_version: "3.0"
_transform: true

# ─── Services ────────────────────────────────────────────────────────────────

services:
  # Auth Service
  - name: auth-service
    url: http://rez-auth-service:3001
    routes:
      - name: auth-route
        paths:
          - /api/auth
        methods:
          - GET
          - POST
          - PUT
          - DELETE
        strip_path: false
        preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid
          echo_downstream: true

