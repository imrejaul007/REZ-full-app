name: REZ API Gateway CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npm run typecheck 2>/dev/null || npx tsc --noEmit 2>/dev/null || echo "no typecheck"
      - name: Lint
        run: npm run lint 2>/dev/null || echo "no lint"
      - name: Build
        run: npm run build 2>/dev/null || echo "no build"
